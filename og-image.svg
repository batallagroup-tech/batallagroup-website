<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid texture -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Línea decorativa superior -->
  <rect x="80" y="80" width="60" height="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Label -->
  <text x="80" y="160"
    font-family="'Space Grotesk', Arial, sans-serif"
    font-size="13"
    font-weight="600"
    letter-spacing="4"
    fill="#444444"
    text-transform="uppercase">BATALLA GROUP · 2026</text>

  <!-- Título principal -->
  <text x="80" y="320"
    font-family="'Space Grotesk', Arial Black, sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-4"
    fill="#ffffff">BATALLA</text>

  <text x="80" y="440"
    font-family="'Space Grotesk', Arial Black, sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-4"
    fill="#333333">GROUP</text>

  <!-- Línea divisora -->
  <rect x="80" y="478" width="1040" height="1" fill="#1e1e1e"/>

  <!-- Subtítulo -->
  <text x="80" y="522"
    font-family="'Inter', Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="#888888"
    letter-spacing="1">Tecnología para el México que los grandes ignoran.</text>

  <!-- URL -->
  <text x="1120" y="522"
    font-family="'Space Grotesk', Arial, sans-serif"
    font-size="14"
    font-weight="500"
    fill="#333333"
    letter-spacing="1"
    text-anchor="end">batallagroup.com</text>

  <!-- Línea decorativa derecha -->
  <rect x="1120" y="80" width="1" height="60" fill="rgba(255,255,255,0.1)"/>
</svg>
